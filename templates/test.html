<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrician Services - Homelynk</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#f6f7f9;
  color:#1c1c1c;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  font-size:22px;
  font-weight:600;
  margin-bottom:20px;
}

/* LAYOUT */
.layout{
  display:flex;
  gap:30px;
}

/* LEFT */
.left{
  flex:2;
}

/* RIGHT CART */
.right{
  flex:1;
}

/* SERVICE CARD */
.service-card{
  background:#fff;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #eee;
}

/* INFO */
.info h4{
  font-size:16px;
  margin-bottom:6px;
}

.info p{
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}

.price{
  font-weight:600;
}

/* ADD BUTTON */
.add-btn{
  padding:8px 16px;
  border:1px solid #111;
  border-radius:8px;
  background:#fff;
  cursor:pointer;
  font-weight:500;
}

.add-btn:hover{
  background:#111;
  color:#fff;
}

/* RIGHT BOX */
.cart-box{
  background:#fff;
  padding:20px;
  border-radius:14px;
  border:1px solid #eee;
  position:sticky;
  top:20px;
}

.cart-box h3{
  margin-bottom:10px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:14px;
}

.total{
  font-weight:600;
  margin-top:10px;
}

/* BUTTON */
.view-cart{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="header">Electrician Services</div>

<div class="layout">

<!-- LEFT SIDE -->
<div class="left">

<div class="service-card">
  <div class="info">
    <h4>Switch Board Repair</h4>
    <p>Fix loose or damaged switches</p>
    <div class="price">₹149</div>
  </div>
  <button class="add-btn">Add</button>
</div>

<div class="service-card">
  <div class="info">
    <h4>Fan Installation</h4>
    <p>Ceiling fan setup & wiring</p>
    <div class="price">₹199</div>
  </div>
  <button class="add-btn">Add</button>
</div>

<div class="service-card">
  <div class="info">
    <h4>Tube Light Repair</h4>
    <p>Fix flickering or dead lights</p>
    <div class="price">₹129</div>
  </div>
  <button class="add-btn">Add</button>
</div>

<div class="service-card">
  <div class="info">
    <h4>Full House Wiring Check</h4>
    <p>Complete inspection</p>
    <div class="price">₹299</div>
  </div>
  <button class="add-btn">Add</button>
</div>

</div>

<!-- RIGHT SIDE CART -->
<div class="right">

<div class="cart-box">
  <h3>Your Cart</h3>

  <div class="cart-item">
    <span>Fan Installation</span>
    <span>₹199</span>
  </div>

  <div class="cart-item total">
    <span>Total</span>
    <span>₹199</span>
  </div>

  <button class="view-cart">View Cart</button>

</div>

</div>

</div>

</div>

</body>
</html>
